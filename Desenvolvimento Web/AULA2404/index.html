<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 2404 | Aula EAD</title>

    <link rel="stylesheet" href="estilo.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Raleway:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <main id="main" class="modo_escuro">
        <form action="">
            <button id="tema" class="botao">Tema</button>

            <fieldset class="form_fieldset">
                <legend>Saudação</legend>
                <p>Digite seu nome para receber uma saudação!</p>

                <label for="nome">Nome</label>
                <input id="nome" name="nome" type="text" placeholder="Seu nome" autocomplete="name">

                <button id="saudacao" class="botao">Saudação</button>
                <p id="p_saudacao"></p>
            </fieldset>

            <fieldset class="form_fieldset">
                <legend>Dados pessoais</legend>

                <label for="data_nasc">Data de Nascimento</label>
                <input id="data_nasc" name="data_nasc" type="date" placeholder="Sua data de nascimento">

                <label for="email">E-mail</label>
                <input id="email" name="email" type="email" placeholder="email@dominio.com">
            </fieldset>

            <fieldset class="form_fieldset">
                <legend>Dados acadêmicos</legend>

                <label for="curso">Curso</label>
                <select name="curso" id="curso">
                    <option value="ads">ADS</option>
                    <option value="mec">Mecânica</option>
                    <option value="inf">Informática</option>
                    <option value="gc">Gestão Comercial</option>
                </select>

                <label for="periodo">Período</label>
                <input type="number" id="periodo" name="periodo" min="1" max="10" step="1" value="1">
            </fieldset>

            <button type="submit" class="botao">Enviar</button>
        </form>
    </main>

    <footer id="footer" class="modo_escuro_footer">
        <div class="img_footer">
            <a href="https://github.com/meaggodoy" target="_blank"><img src="github.png" alt="GitHub"></a>
            <a href="https://www.linkedin.com/in/maria-eduarda-antunes-godoy-392265388/" target="_blank"><img src="linkedin.png" alt="Linkedin"></a>
        </div>
        <p>copyright | Aula 24/04/2026</p>
        <p>Maria Eduarda Antunes Godoy</p>
        <a href="exercicios.html">Exercícios 24/04</a>
    </footer>

    <script src="app.js"></script>
</body>
</html>
